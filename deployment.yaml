apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-ms-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-ms-demo
  template:
    metadata:
      labels:
        app: java-ms-demo
    spec:
      containers:
      - name: java-ms-demo
        image: 192.168.80.140:80/dev/java-ms-demo:1.0
        ports:
        - containerPort: 8080
