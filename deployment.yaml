apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-ms-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-ms-demo
  template:
    metadata:
      labels:
        app: java-ms-demo
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: java-ms-demo
          image: 192.168.80.140:80/dev/java-ms-demo:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
